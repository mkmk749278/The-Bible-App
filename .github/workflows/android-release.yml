name: Android Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Which part of the version to bump for this release"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true
      version:
        description: "Optional exact version, e.g. 0.3.0 (overrides the bump choice; leave blank to auto-bump)"
        required: false
        default: ""
      publish_to_play:
        description: "Also upload the AAB to Play Console (internal track, draft)"
        type: boolean
        required: false
        default: false

# action-gh-release needs write access to create the tag + release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On a manual run, figure out the next version automatically so clicking
      # "Run workflow" alone produces a proper new release. The base is the latest
      # published GitHub Release tag (falling back to versionName in build.gradle if
      # there are none yet); the `bump` choice decides patch/minor/major, or the
      # optional `version` input overrides it. versionCode is derived deterministically
      # (MAJOR*10000 + MINOR*100 + PATCH) so it always increases.
      # On a tag push this step is skipped — the tag itself is the version, built from
      # whatever is already committed.
      - name: Resolve release version
        id: version
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ github.event.inputs.bump }}
          OVERRIDE: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          base="$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"
          if [ -z "$base" ]; then
            base="v$(grep -E 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')"
          fi
          base="${base#v}"
          MA="${base%%.*}"; rest="${base#*.}"; MI="${rest%%.*}"; PA="${rest##*.}"
          if [ -n "${OVERRIDE}" ]; then
            newver="${OVERRIDE#v}"
            if ! printf '%s' "$newver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::version input '${OVERRIDE}' must look like 0.3.0"; exit 1
            fi
          else
            case "${BUMP}" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              *)     PA=$((PA+1)) ;;
            esac
            newver="${MA}.${MI}.${PA}"
          fi
          NMA="${newver%%.*}"; nrest="${newver#*.}"; NMI="${nrest%%.*}"; NPA="${nrest##*.}"
          code=$((NMA*10000 + NMI*100 + NPA))
          {
            echo "name=$newver"
            echo "code=$code"
            echo "tag=v$newver"
          } >> "$GITHUB_OUTPUT"
          echo "### 🔖 Releasing v$newver (versionCode $code), based on v$base" >> "$GITHUB_STEP_SUMMARY"

      # Write the resolved version into build.gradle so the built APK/AAB actually
      # report it, then commit the bump back to main. The commit is best-effort: if
      # main is a protected branch and the push is rejected, the release still proceeds
      # (the artifacts carry the right version, and the next run reads the new release
      # tag as its base regardless).
      - name: Apply version bump
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          V_NAME: ${{ steps.version.outputs.name }}
          V_CODE: ${{ steps.version.outputs.code }}
        run: |
          set -euo pipefail
          sed -i -E "s/versionCode = [0-9]+/versionCode = ${V_CODE}/" app/build.gradle.kts
          sed -i -E "s/versionName = \"[0-9]+\.[0-9]+\.[0-9]+\"/versionName = \"${V_NAME}\"/" app/build.gradle.kts
          grep -E "versionCode|versionName" app/build.gradle.kts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore(release): bump to v${V_NAME}" || { echo "nothing to commit"; exit 0; }
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      # Decode the keystore and verify it is actually readable BEFORE the build, so a
      # missing/garbage KEYSTORE_BASE64 secret produces a clear message here instead of
      # a cryptic "Tag number over 30 is not supported" failure deep in packageRelease.
      # Sets steps.keystore.outputs.signed = true|false.
      - name: Decode & validate keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is not set — building an UNSIGNED release."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ks="$RUNNER_TEMP/release-keystore.jks"
          # printf (not echo) avoids mangling; base64 tolerates the trailing newline.
          if ! printf '%s' "${KEYSTORE_BASE64}" | base64 -d > "$ks" 2>/dev/null; then
            echo "::error::KEYSTORE_BASE64 is not valid base64. Recreate it from your keystore with: base64 -w0 release-keystore.jks  (Linux)  or  base64 -i release-keystore.jks | tr -d '\\n'  (macOS), then set it as the secret."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if keytool -list -keystore "$ks" -storepass "${KEYSTORE_PASSWORD:-}" >/dev/null 2>&1; then
            echo "Keystore decoded and validated."
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::The decoded keystore could not be read — KEYSTORE_BASE64 is corrupted or KEYSTORE_PASSWORD is wrong. Building an UNSIGNED release. Fix the secrets to produce a signed build."
            rm -f "$ks"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK + AAB
        env:
          # Only point Gradle at the keystore when it validated; otherwise the build
          # is unsigned (Gradle treats a blank/missing path as "no signing").
          KEYSTORE_PATH: ${{ steps.keystore.outputs.signed == 'true' && format('{0}/release-keystore.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Report signing status
        run: |
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            echo "### ✅ Signed release built" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ UNSIGNED release built" >> "$GITHUB_STEP_SUMMARY"
            echo "Set the \`KEYSTORE_BASE64\`, \`KEYSTORE_PASSWORD\`, \`KEY_ALIAS\`, and \`KEY_PASSWORD\` secrets to produce a signed build for distribution." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manna-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      # Publishes to the Releases page on a version-tag push, or on a manual run
      # (workflow_dispatch). For a manual run, action-gh-release creates the auto-bumped
      # tag at the tip of main (the bump commit). A signed APK is required for the build
      # to be installable.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag || github.ref_name }}
          name: Manna ${{ steps.version.outputs.tag || github.ref_name }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || '' }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      # CD: upload the signed AAB to the Play Console (internal track, draft).
      # Runs automatically on a version-tag push, and on a manual dispatch with
      # publish_to_play=true. Always gated on a signed build AND the service-account
      # secret being present. When the secret is missing the behavior depends on intent:
      # a tag-triggered run skips gracefully (the release still succeeds), while an
      # explicit manual publish_to_play=true run fails loudly. The Gradle Play Publisher
      # plugin reads the credentials JSON from ANDROID_PUBLISHER_CREDENTIALS and uploads
      # to the internal track as a DRAFT (see the play { } block in app/build.gradle.kts),
      # so nothing reaches users until you promote it in Play Console.
      # Prerequisite: the app must already exist in Play Console with one manual AAB
      # upload — the Play Developer API cannot create a new app from scratch.
      - name: Publish AAB to Play Console (internal)
        if: >-
          steps.keystore.outputs.signed == 'true' &&
          (
            startsWith(github.ref, 'refs/tags/') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_play == 'true')
          )
        env:
          # base64-encoded service-account JSON (per CLAUDE.md). The secrets context is
          # not usable in step `if:`, so presence is checked inside the script instead.
          PLAY_SA_BASE64: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          # True only when the user explicitly asked to publish via manual dispatch — a
          # missing secret is then an error rather than a graceful skip.
          PUBLISH_EXPLICIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_play == 'true' }}
        run: |
          set -euo pipefail
          if [ -z "${PLAY_SA_BASE64}" ]; then
            if [ "${PUBLISH_EXPLICIT}" = "true" ]; then
              echo "::error::publish_to_play=true but PLAY_STORE_SERVICE_ACCOUNT secret is not set — cannot upload."
              exit 1
            fi
            echo "::warning::PLAY_STORE_SERVICE_ACCOUNT secret is not set — skipping the Play Store upload. The APK/AAB and GitHub Release were still published."
            echo "### ⏭️ Play upload skipped (no PLAY_STORE_SERVICE_ACCOUNT secret)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Decode to raw JSON, which is what the Play Publisher plugin expects in
          # ANDROID_PUBLISHER_CREDENTIALS.
          ANDROID_PUBLISHER_CREDENTIALS="$(printf '%s' "${PLAY_SA_BASE64}" | base64 -d)"
          export ANDROID_PUBLISHER_CREDENTIALS
          ./gradlew publishReleaseBundle --no-daemon
          echo "### 🚀 AAB uploaded to Play (internal track, draft)" >> "$GITHUB_STEP_SUMMARY"
