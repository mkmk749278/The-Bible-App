name: Android Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Decode keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BIBLE_BRAIN_API_KEY: ${{ secrets.BIBLE_BRAIN_API_KEY }}

      - name: Build signed release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BIBLE_BRAIN_API_KEY: ${{ secrets.BIBLE_BRAIN_API_KEY }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manna-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
