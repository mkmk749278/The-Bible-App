<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bible App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>The Bible App</h1>
  </header>
  <main>
    <section id="verse-of-the-day">
      <h2>Verse of the Day</h2>
      <blockquote id="verse-text">Loading...</blockquote>
      <cite id="verse-ref"></cite>
    </section>
    <section id="search">
      <input type="text" id="search-input" placeholder="Search verses..." />
      <button id="search-btn">Search</button>
      <div id="results"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
